<div class="flex min-h-[calc(100vh-4rem)] items-center justify-center p-4">
  <div class="w-full max-w-md space-y-8 rounded-2xl border border-border bg-card p-8 shadow-2xl">
    <div class="text-center">
      <h2 class="text-3xl font-bold tracking-tight">Crear cuenta</h2>
      <p class="mt-2 text-sm text-muted-foreground">Únete a ColapsoGame</p>
    </div>

    @if (error) {
      <div class="rounded-md bg-destructive/15 p-3 text-sm text-destructive">
        {{ error }}
      </div>
    }

    <form class="space-y-6" (ngSubmit)="onSubmit()">
      <div>
        <label for="name" class="block text-sm font-medium">Nombre de usuario</label>
        <input
          id="name"
          type="text"
          [(ngModel)]="name"
          name="name"
          required
          class="mt-1 flex w-full rounded-md border border-input bg-background px-3 py-2 text-sm placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring"
        />
      </div>

      <div>
        <label for="email" class="block text-sm font-medium">Correo electrónico</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          class="mt-1 flex w-full rounded-md border border-input bg-background px-3 py-2 text-sm placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring"
        />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium">Contraseña</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          class="mt-1 flex w-full rounded-md border border-input bg-background px-3 py-2 text-sm placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring"
        />
      </div>

      <button
        type="submit"
        [disabled]="isLoading || !email || !password || !name"
        class="w-full rounded-md bg-gradient-brand px-4 py-2 text-sm font-medium text-white shadow hover:opacity-90 disabled:opacity-50 border-none"
      >
        {{ isLoading ? 'Creando cuenta...' : 'Registrarse' }}
      </button>
    </form>

    <p class="text-center text-sm text-muted-foreground">
      ¿Ya tienes una cuenta?
      <a routerLink="/login" class="font-medium text-primary hover:underline">
        Inicia sesión
      </a>
    </p>
  </div>
</div>
