<div class="flex min-h-[calc(100vh-4rem)] items-center justify-center p-4">
  <div class="w-full max-w-md space-y-8 rounded-2xl border border-border bg-card p-8 shadow-2xl">
    <div class="text-center">
      <h2 class="text-3xl font-bold tracking-tight">Restablecer contraseña</h2>
      <p class="mt-2 text-sm text-muted-foreground">
        {{ step === 1 ? 'Ingresa el código enviado a ' + email : 'Crea una nueva contraseña' }}
      </p>
    </div>

    @if (error) {
      <div class="rounded-md bg-destructive/15 p-3 text-sm text-destructive">
        {{ error }}
      </div>
    }

    @if (step === 1) {
      <form class="space-y-6" (ngSubmit)="verifyToken()">
        <div>
          <label for="token" class="block text-sm font-medium">Código de seguridad (6 dígitos)</label>
          <input
            id="token"
            type="text"
            [(ngModel)]="token"
            name="token"
            required
            placeholder="Ej: 123456"
            class="mt-1 flex w-full rounded-md border border-input bg-background px-3 py-2 text-sm placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring text-center tracking-widest text-lg"
          />
        </div>

        <button
          type="submit"
          [disabled]="isLoading || !token"
          class="w-full rounded-md bg-gradient-brand px-4 py-2 text-sm font-medium text-white shadow hover:opacity-90 disabled:opacity-50 border-none"
        >
          {{ isLoading ? 'Verificando...' : 'Verificar código' }}
        </button>
      </form>
    } @else {
      <form class="space-y-6" (ngSubmit)="resetPassword()">
        <div>
          <label for="newPassword" class="block text-sm font-medium">Nueva contraseña</label>
          <input
            id="newPassword"
            type="password"
            [(ngModel)]="newPassword"
            name="newPassword"
            required
            class="mt-1 flex w-full rounded-md border border-input bg-background px-3 py-2 text-sm placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring"
          />
        </div>

        <div>
          <label for="confirmPassword" class="block text-sm font-medium">Confirmar contraseña</label>
          <input
            id="confirmPassword"
            type="password"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            required
            class="mt-1 flex w-full rounded-md border border-input bg-background px-3 py-2 text-sm placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring"
          />
        </div>

        <button
          type="submit"
          [disabled]="isLoading || !newPassword || !confirmPassword"
          class="w-full rounded-md bg-gradient-brand px-4 py-2 text-sm font-medium text-white shadow hover:opacity-90 disabled:opacity-50 border-none"
        >
          {{ isLoading ? 'Guardando...' : 'Guardar nueva contraseña' }}
        </button>
      </form>
    }
  </div>
</div>
