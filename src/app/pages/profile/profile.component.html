<div class="mx-auto max-w-2xl px-4 py-8">
  <h1 class="mb-8 text-3xl font-extrabold tracking-tight">Mi Perfil</h1>

  <div class="space-y-8">
    <section class="rounded-2xl border border-border bg-card p-6">
      <h2 class="mb-4 text-xl font-semibold">Información Personal</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-muted-foreground">Nombre</label>
          <p class="mt-1 text-lg">{{ user?.user_na }}</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-muted-foreground">Correo electrónico</label>
          <p class="mt-1 text-lg">{{ user?.user_mail }}</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-muted-foreground">Rol actual</label>
          <div class="mt-1 inline-flex items-center rounded-md border px-2.5 py-0.5 text-xs font-semibold text-primary">
            {{ user?.role }}
          </div>
        </div>
      </div>
    </section>

    <section class="rounded-2xl border border-border bg-card p-6">
      <h2 class="mb-4 text-xl font-semibold">Zona de Peligro</h2>
      <p class="mb-4 text-sm text-muted-foreground">
        Una vez que elimines tu cuenta, no hay vuelta atrás. Por favor, asegúrate.
      </p>
      <button
        (click)="handleDeleteAccount()"
        [disabled]="isDeleting"
        class="inline-flex items-center justify-center rounded-md bg-destructive px-4 py-2 text-sm font-medium text-destructive-foreground hover:bg-destructive/90 disabled:opacity-50 border-none"
      >
        {{ isDeleting ? 'Eliminando...' : 'Eliminar mi cuenta' }}
      </button>
    </section>
  </div>
</div>
