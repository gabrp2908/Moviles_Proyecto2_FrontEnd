<div class="mx-auto max-w-2xl px-4 py-8">
  <h1 class="mb-8 text-3xl font-extrabold tracking-tight">Mi Perfil</h1>

  <div class="space-y-8">
    <section class="rounded-2xl border border-border bg-card p-6">
      <div class="mb-4 flex items-center justify-between">
        <h2 class="text-xl font-semibold">Información Personal</h2>
        @if (!isEditing) {
          <button
            (click)="startEditing()"
            class="inline-flex items-center justify-center rounded-md border border-input bg-background px-3 py-1.5 text-sm font-medium hover:bg-accent hover:text-accent-foreground border-none text-primary bg-transparent font-semibold cursor-pointer"
          >
            Editar Perfil
          </button>
        }
      </div>

      @if (isEditing) {
        <form (submit)="$event.preventDefault(); handleUpdateProfile()" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-muted-foreground">Nombre</label>
            <input
              type="text"
              [(ngModel)]="editName"
              name="editName"
              required
              class="mt-1 flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-muted-foreground">Correo electrónico</label>
            <input
              type="email"
              [(ngModel)]="editEmail"
              name="editEmail"
              required
              class="mt-1 flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-muted-foreground">Nueva contraseña (dejar en blanco si no deseas cambiarla)</label>
            <input
              type="password"
              [(ngModel)]="editPassword"
              name="editPassword"
              placeholder="••••••••"
              class="mt-1 flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring"
            />
          </div>
          <div class="flex gap-2">
            <button
              type="submit"
              [disabled]="isSaving"
              class="inline-flex items-center justify-center rounded-md bg-primary px-4 py-2 text-sm font-medium text-primary-foreground hover:bg-primary/90 disabled:opacity-50 border-none cursor-pointer"
            >
              {{ isSaving ? 'Guardando...' : 'Guardar Cambios' }}
            </button>
            <button
              type="button"
              (click)="isEditing = false"
              class="inline-flex items-center justify-center rounded-md border border-input bg-background px-4 py-2 text-sm font-medium hover:bg-accent hover:text-accent-foreground border-none cursor-pointer"
            >
              Cancelar
            </button>
          </div>
        </form>
      } @else {
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-muted-foreground">Nombre</label>
            <p class="mt-1 text-lg">{{ user?.user_na }}</p>
          </div>
          <div>
            <label class="block text-sm font-medium text-muted-foreground">Correo electrónico</label>
            <p class="mt-1 text-lg">{{ user?.user_mail }}</p>
          </div>
          <div>
            <label class="block text-sm font-medium text-muted-foreground">Rol actual</label>
            <div class="mt-1 inline-flex items-center rounded-md border px-2.5 py-0.5 text-xs font-semibold text-primary">
              {{ user?.role }}
            </div>
          </div>
        </div>
      }
    </section>

    <section class="rounded-2xl border border-border bg-card p-6">
      <h2 class="mb-4 text-xl font-semibold">Zona de Peligro</h2>
      <p class="mb-4 text-sm text-muted-foreground">
        Una vez que elimines tu cuenta, no hay vuelta atrás. Por favor, asegúrate.
      </p>
      <button
        (click)="handleDeleteAccount()"
        [disabled]="isDeleting"
        class="inline-flex items-center justify-center rounded-md bg-destructive px-4 py-2 text-sm font-medium text-destructive-foreground hover:bg-destructive/90 disabled:opacity-50 border-none"
      >
        {{ isDeleting ? 'Eliminando...' : 'Eliminar mi cuenta' }}
      </button>
    </section>
  </div>
</div>
