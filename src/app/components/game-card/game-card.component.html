<a
  [routerLink]="['/games', game.igdb_id]"
  class="group relative flex flex-col overflow-hidden rounded-xl border border-border bg-card transition-all hover:-translate-y-1 hover:border-primary/60 hover:shadow-[var(--shadow-glow)] h-full cursor-pointer no-underline"
>
  <div class="relative aspect-[3/4] overflow-hidden bg-muted">
    @if (game.caratula) {
      <img
        [src]="game.caratula"
        [alt]="game.nombre"
        loading="lazy"
        class="h-full w-full object-cover transition-transform duration-300 group-hover:scale-105"
      />
    } @else {
      <div class="flex h-full w-full items-center justify-center text-muted-foreground">
        Sin carátula
      </div>
    }
    <div class="absolute inset-x-0 bottom-0 h-20 bg-gradient-to-t from-card to-transparent pointer-events-none"></div>
  </div>
  <div class="flex flex-1 flex-col gap-3 p-4">
    <div class="flex-1">
      <h3 class="line-clamp-2 font-semibold leading-tight text-card-foreground">
        {{ game.nombre }}
      </h3>
      <p class="mt-1 text-sm text-muted-foreground">{{ game.anio || "—" }}</p>
    </div>
    <div class="flex items-center gap-4">
      <app-score-badge [score]="game.promedio_puntuacion_usuarios" label="Usuarios" size="sm"></app-score-badge>
      <app-score-badge
        [score]="game.promedio_puntuacion_criticos"
        label="Críticos"
        variant="critic"
        size="sm"
      ></app-score-badge>
    </div>
  </div>
</a>
