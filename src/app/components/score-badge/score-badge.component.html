<div class="flex flex-col items-center gap-1">
  <div
    class="flex items-center justify-center rounded-xl font-bold text-white shadow-md"
    [class]="getDimsClass()"
    [class.opacity-40]="!hasScore"
    [style.backgroundColor]="hasScore ? getScoreColor() : 'var(--muted)'"
    [style.borderWidth]="variant === 'critic' ? '2px' : '0'"
    [style.borderColor]="'var(--pink)'"
    [title]="hasScore ? '' : 'Sin calificaciones'"
  >
    {{ hasScore ? (score | number:'1.1-1') : '—' }}
  </div>
  @if (label) {
    <span class="text-[10px] font-medium uppercase tracking-wide text-muted-foreground">
      {{ label }}
    </span>
  }
</div>
